<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Screenshoot - Quiz Genio</title>
    <style>
        :root {
            --ink: #10151f;
            --muted: #657386;
            --glass: rgba(255, 255, 255, 0.22);
            --glass-strong: rgba(255, 255, 255, 0.42);
            --line: rgba(255, 255, 255, 0.52);
            --cyan: #32d5ff;
            --mint: #43f2b7;
            --shadow: 0 28px 80px rgba(30, 46, 76, 0.22);
        }

        * {
            box-sizing: border-box;
        }

        html {
            min-height: 100%;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            color: var(--ink);
            background:
                radial-gradient(circle at 14% 18%, rgba(50, 213, 255, 0.36), transparent 28%),
                radial-gradient(circle at 88% 12%, rgba(255, 111, 174, 0.30), transparent 24%),
                radial-gradient(circle at 70% 86%, rgba(67, 242, 183, 0.28), transparent 28%),
                linear-gradient(135deg, #f5fbff 0%, #edf2ff 44%, #fff5f9 100%);
            overflow-x: hidden;
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            pointer-events: none;
            background-image:
                linear-gradient(rgba(255, 255, 255, 0.32) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.32) 1px, transparent 1px);
            background-size: 56px 56px;
            mask-image: linear-gradient(to bottom, black, transparent 78%);
        }

        .page {
            position: relative;
            width: min(1180px, calc(100% - 32px));
            min-height: 100vh;
            margin: 0 auto;
            padding: 22px 0 64px;
        }

        .glass {
            border: 1px solid var(--line);
            background: linear-gradient(145deg, var(--glass-strong), var(--glass));
            box-shadow: var(--shadow), inset 0 1px 0 rgba(255, 255, 255, 0.74);
            backdrop-filter: blur(24px) saturate(148%);
            -webkit-backdrop-filter: blur(24px) saturate(148%);
        }

        .topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            min-height: 64px;
            padding: 10px 12px 10px 18px;
            border-radius: 24px;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 10px;
            color: inherit;
            font-weight: 800;
            text-decoration: none;
        }

        .brand-mark {
            display: block;
            width: 68px;
            height: 68px;
            border-radius: 24px;
            object-fit: cover;
            background: rgba(255, 255, 255, 0.28);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.72), 0 12px 24px rgba(50, 213, 255, 0.24);
        }

        nav {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        nav a {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 42px;
            padding: 0 16px;
            border-radius: 999px;
            color: inherit;
            text-decoration: none;
            font-size: 0.94rem;
            font-weight: 700;
            background: rgba(255, 255, 255, 0.24);
            transition: transform 180ms ease, background 180ms ease, box-shadow 180ms ease;
        }

        nav a:hover {
            transform: translateY(-2px);
            background: rgba(255, 255, 255, 0.38);
        }

        .stage {
            display: grid;
            gap: 28px;
            padding: 56px 0 24px;
        }

        .intro-card {
            width: min(820px, 100%);
            margin: 0 auto;
            padding: clamp(24px, 4vw, 34px);
            border-radius: 30px;
            text-align: center;
        }

        .title-image {
            display: block;
            width: min(520px, 100%);
            height: auto;
            margin: 0 auto 24px;
            filter: drop-shadow(0 18px 28px rgba(30, 46, 76, 0.20));
        }

        .eyebrow {
            margin: 0 0 12px;
            color: #2f4558;
            font-size: 0.88rem;
            font-weight: 900;
            text-transform: uppercase;
        }

        h1 {
            margin: 0;
            font-size: clamp(2.2rem, 6vw, 4.8rem);
            line-height: 0.98;
            letter-spacing: 0;
        }

        .intro-card p {
            max-width: 620px;
            margin: 18px auto 0;
            color: var(--muted);
            font-size: clamp(1rem, 1.7vw, 1.2rem);
            line-height: 1.6;
        }

        .screenshots-grid {
            display: grid;
            grid-template-columns: repeat(5, minmax(0, 1fr));
            gap: clamp(14px, 2vw, 18px);
            align-items: start;
        }

        .screenshot-card {
            padding: 12px;
            border-radius: 32px;
            transition: transform 180ms ease, box-shadow 180ms ease;
        }

        .screenshot-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 34px 90px rgba(30, 46, 76, 0.30), inset 0 1px 0 rgba(255, 255, 255, 0.74);
        }

        .screenshot-card img {
            display: block;
            width: 100%;
            height: auto;
            border-radius: 24px;
            box-shadow: 0 18px 46px rgba(30, 46, 76, 0.22);
            cursor: zoom-in;
        }

        .lightbox {
            position: fixed;
            inset: 0;
            z-index: 50;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 28px;
            background: rgba(16, 21, 31, 0.42);
            backdrop-filter: blur(26px) saturate(150%);
            -webkit-backdrop-filter: blur(26px) saturate(150%);
        }

        .lightbox.is-open {
            display: flex;
        }

        .lightbox-image {
            display: block;
            max-width: min(92vw, 520px);
            max-height: 88vh;
            width: auto;
            height: auto;
            border-radius: 32px;
            box-shadow: 0 36px 110px rgba(0, 0, 0, 0.36);
        }

        .lightbox-close {
            position: fixed;
            top: 22px;
            right: 22px;
            width: 46px;
            height: 46px;
            border: 1px solid rgba(255, 255, 255, 0.52);
            border-radius: 999px;
            color: white;
            background: rgba(255, 255, 255, 0.22);
            font-size: 2rem;
            line-height: 1;
            cursor: pointer;
            backdrop-filter: blur(18px) saturate(148%);
            -webkit-backdrop-filter: blur(18px) saturate(148%);
        }

        .footer {
            display: flex;
            justify-content: center;
            margin-top: 28px;
            padding: 18px;
            border-radius: 22px;
            color: var(--muted);
            font-size: 0.95rem;
            font-weight: 700;
            text-align: center;
        }

        @media (max-width: 1180px) {
            .screenshots-grid {
                grid-template-columns: repeat(3, minmax(0, 1fr));
            }
        }

        @media (max-width: 820px) {
            .screenshots-grid {
                grid-template-columns: repeat(2, minmax(0, 1fr));
            }

            .lightbox-image {
                max-width: min(92vw, 440px);
            }
        }

        @media (max-width: 680px) {
            .page {
                width: min(100% - 20px, 1180px);
                padding-top: 10px;
                padding-bottom: 34px;
            }

            .topbar {
                align-items: center;
                flex-direction: column;
                padding: 12px;
            }

            .brand-mark {
                width: 58px;
                height: 58px;
                border-radius: 20px;
            }

            nav {
                width: 100%;
                justify-content: center;
                flex-wrap: wrap;
                gap: 8px;
            }

            nav a {
                min-height: 40px;
                padding: 0 13px;
                font-size: 0.88rem;
            }

            .stage {
                padding-top: 34px;
            }

            .intro-card {
                border-radius: 26px;
            }

            .screenshots-grid {
                grid-template-columns: 1fr;
                justify-items: center;
            }

            .screenshot-card {
                width: min(100%, 340px);
            }

            .lightbox {
                padding: 18px;
            }

            .lightbox-image {
                max-width: 92vw;
                max-height: 82vh;
                border-radius: 26px;
            }

            .footer {
                width: 100%;
                font-size: 0.92rem;
            }
        }

        @media (max-width: 420px) {
            .brand span {
                display: none;
            }

            h1 {
                font-size: 2.1rem;
            }

            .intro-card p,
            .footer {
                font-size: 0.94rem;
            }

            .lightbox-close {
                top: 14px;
                right: 14px;
            }
        }
    </style>
</head>
<body>
    <main class="page">
        <header class="topbar glass">
            <a class="brand" href="index.html" aria-label="Quiz Genio Home">
                <img class="brand-mark" src="Assets/IconiOS.png" alt="Quiz Genio">
                <span>Quiz Genio</span>
            </a>
            <nav aria-label="Navigazione principale">
                <a href="index.html">Home</a>
                <a href="Privacy.html">Privacy Policy</a>
                <a href="Contatto.html">Contatto</a>
            </nav>
        </header>

        <section class="stage">
            <div class="intro-card glass">
                <img class="title-image" src="Assets/Titolo.png" alt="Quiz Genio">
                <p class="eyebrow">Screenshoot</p>
                <h1>Galleria</h1>
                <p>Una panoramica delle schermate principali di Quiz Genio, dal gioco a tempo alle categorie e ai progressi della sfida.</p>
            </div>

            <div class="screenshots-grid" aria-label="Screenshoot di Quiz Genio">
                <figure class="screenshot-card glass">
                    <img src="Assets/scr1.PNG" alt="Screenshoot 1 di Quiz Genio">
                </figure>
                <figure class="screenshot-card glass">
                    <img src="Assets/scr2.PNG" alt="Screenshoot 2 di Quiz Genio">
                </figure>
                <figure class="screenshot-card glass">
                    <img src="Assets/scr3.PNG" alt="Screenshoot 3 di Quiz Genio">
                </figure>
                <figure class="screenshot-card glass">
                    <img src="Assets/scr4.PNG" alt="Screenshoot 4 di Quiz Genio">
                </figure>
                <figure class="screenshot-card glass">
                    <img src="Assets/scr5.PNG" alt="Screenshoot 5 di Quiz Genio">
                </figure>
            </div>
        </section>

        <footer class="footer glass">
            Costa Fabio Sviluppatore iOS e Android - Copyright &copy; 2026 - Tutti i diritti sono riservati
        </footer>
    </main>

    <div class="lightbox" id="lightbox" aria-hidden="true">
        <button class="lightbox-close" type="button" aria-label="Chiudi immagine">&times;</button>
        <img class="lightbox-image" src="" alt="">
    </div>

    <script>
        const lightbox = document.querySelector("#lightbox");
        const lightboxImage = document.querySelector(".lightbox-image");
        const closeButton = document.querySelector(".lightbox-close");
        const screenshots = document.querySelectorAll(".screenshot-card img");

        function openLightbox(image) {
            lightboxImage.src = image.src;
            lightboxImage.alt = image.alt;
            lightbox.classList.add("is-open");
            lightbox.setAttribute("aria-hidden", "false");
        }

        function closeLightbox() {
            lightbox.classList.remove("is-open");
            lightbox.setAttribute("aria-hidden", "true");
            lightboxImage.src = "";
            lightboxImage.alt = "";
        }

        screenshots.forEach((image) => {
            image.addEventListener("click", () => openLightbox(image));
        });

        closeButton.addEventListener("click", closeLightbox);

        lightbox.addEventListener("click", (event) => {
            if (event.target === lightbox) {
                closeLightbox();
            }
        });

        document.addEventListener("keydown", (event) => {
            if (event.key === "Escape" && lightbox.classList.contains("is-open")) {
                closeLightbox();
            }
        });
    </script>
</body>
</html>
